name: m7-fnguide-weekly

on:
  schedule:
    - cron: "37 22 * * 5"   # 토 07:37 KST (1차 — 정각 혼잡 회피)
    - cron: "7 3 * * 6"     # 토 12:07 KST (2차 보험 — 1차 성공 시 같은날 덮어쓰기라 무해)
  workflow_dispatch:        # 수동 실행 (모바일 GitHub 앱에서도 가능)
    inputs:
      top_n:
        description: "유니버스 크기 — 수동 실행 기본은 테스트용 10, 전체는 300 입력"
        required: false
        default: "10"

permissions:
  contents: write

concurrency:
  group: m7
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pandas lxml beautifulsoup4 finance-datareader

      - name: Run scraper
        env:
          M7_TOP_N: ${{ github.event.inputs.top_n || '300' }}
        run: python -u m7_fnguide.py

      - name: Build leader list
        run: python -u leader_weekly.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/
          git commit -m "m7 snapshot $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin main
          git push
